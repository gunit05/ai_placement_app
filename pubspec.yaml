name: hire_hub

description: "HIRE HUB: AI-Powered College Placement Android Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  local_auth: ^2.1.6
  image_picker: ^1.1.2
 
  # Supabase
  supabase_flutter: ^2.5.6

  # File & Network
  file_picker: ^10.3.10
  http: ^1.2.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

  # PDF
  syncfusion_flutter_pdf: ^32.2.9
  pdf: ^3.10.8
  printing: ^5.13.0
  flutter_pdfview: ^1.3.2

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2

  # Voice Interview
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.2

  # UI
  percent_indicator: ^4.2.4
  animated_splash_screen: ^1.3.0
  page_transition: ^2.1.0
  fl_chart: ^0.68.0

  # Coding Interview
  flutter_code_editor: ^0.3.0
  highlight: ^0.7.0

  # Camera Interview
  camera: ^0.10.5+9
  video_player: ^2.8.1

  # Utility
  share_plus: ^7.2.1
  permission_handler: ^11.0.1
  flutter_dotenv: ^6.0.1

  # AI
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/.env
    - assets/icon/app_icon.png
    - assets/icon/google.png
    - assets/icon/ai_robot.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

  adaptive_icon_background: "#6B1C90"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#6B1C90"
  image: assets/icon/app_icon.png
  android: true
  ios: true

  android_12:
    image: assets/icon/app_icon.png
    icon_background_color: "#6B1C90"